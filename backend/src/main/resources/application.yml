server:
  port: 8080

spring:
  application:
    name: support-saas-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/supportsaas}
    username: ${SPRING_DATASOURCE_USERNAME:supportsaas}
    password: ${SPRING_DATASOURCE_PASSWORD:supportsaas}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-prod-min-256-bits}
    access-token-expiry-ms: 900000        # 15 min
    refresh-token-expiry-ms: 604800000    # 7 days

ml-service:
  base-url: ${ML_SERVICE_URL:http://localhost:8000}

logging:
  level:
    com.supportsaas: INFO
